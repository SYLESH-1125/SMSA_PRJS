<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopLite — Demo E-Commerce</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#" id="brand-link">🛍️ Shop<span>Lite</span></a>

      <div class="search-wrap">
        <input type="search" id="search-input" placeholder="Search products…" aria-label="Search products" />
      </div>

      <button class="cart-btn" id="cart-toggle" aria-label="Open cart">
        🛒 Cart
        <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </header>

  <!-- ===== Toolbar: categories + sort ===== -->
  <div class="toolbar">
    <div class="chips" id="category-chips" role="tablist" aria-label="Categories"></div>
    <select id="sort-select" aria-label="Sort products">
      <option value="featured">Featured</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="name-asc">Name: A → Z</option>
      <option value="rating-desc">Top Rated</option>
    </select>
  </div>

  <!-- ===== Product grid ===== -->
  <main class="container">
    <p class="results-info" id="results-info"></p>
    <section class="grid" id="product-grid" aria-live="polite"></section>
    <p class="empty-state hidden" id="empty-state">😕 No products match your search.</p>
  </main>

  <!-- ===== Cart drawer ===== -->
  <div class="overlay hidden" id="overlay"></div>
  <aside class="cart-drawer" id="cart-drawer" aria-label="Shopping cart" aria-hidden="true">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="icon-btn" id="cart-close" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span>Subtotal</span>
        <strong id="cart-subtotal">$0.00</strong>
      </div>
      <button class="btn primary block" id="checkout-btn" disabled>Checkout</button>
      <button class="btn ghost block" id="clear-cart-btn" disabled>Clear cart</button>
    </div>
  </aside>

  <!-- ===== Checkout modal ===== -->
  <div class="modal hidden" id="checkout-modal" role="dialog" aria-modal="true" aria-labelledby="checkout-title">
    <div class="modal-card">
      <h2 id="checkout-title">Checkout</h2>
      <form id="checkout-form" novalidate>
        <label>Full name
          <input type="text" id="co-name" required placeholder="Jane Doe" />
        </label>
        <label>Email
          <input type="email" id="co-email" required placeholder="jane@example.com" />
        </label>
        <label>Shipping address
          <input type="text" id="co-address" required placeholder="221B Baker Street" />
        </label>
        <div class="order-summary" id="order-summary"></div>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="checkout-cancel">Cancel</button>
          <button type="submit" class="btn primary">Place order</button>
        </div>
      </form>
      <div class="order-success hidden" id="order-success">
        <div class="success-emoji">🎉</div>
        <h3>Order placed!</h3>
        <p id="order-confirm-msg"></p>
        <button class="btn primary" id="continue-shopping">Continue shopping</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <footer class="site-footer">
    ShopLite — demo e-commerce app · static HTML/CSS/JS · no backend, no real payments
  </footer>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
